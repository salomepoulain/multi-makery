name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint scripts with shellcheck
        run: |
          shellcheck office/install_makery.sh
          shellcheck office/open_makery.sh
          shellcheck kitchen/headchef/orders/*.sh

      - name: Test open_makery.sh (make-only setup)
        run: |
          mkdir -p /tmp/test-make-only
          cd /tmp/test-make-only
          bash ${{ github.workspace }}/office/open_makery.sh
          make germs
          make menu

      - name: Test bake installation from local code
        run: |
          # Set up .makery from local files (simulate install_makery.sh without download)
          mkdir -p $HOME/.makery
          cp -r ${{ github.workspace }}/kitchen $HOME/.makery/
          cp -r ${{ github.workspace }}/office $HOME/.makery/
          mkdir -p $HOME/.local/bin
          # Use the new bake script from cabinet
          cp $HOME/.makery/office/cabinet/bake $HOME/.local/bin/bake
          chmod +x $HOME/.local/bin/bake
          export PATH="$HOME/.local/bin:$PATH"
          # Test bake in a new project
          mkdir -p /tmp/test-bake && cd /tmp/test-bake
          bake
          bake germs

      - name: Run shell script tests
        run: |
          bash ${{ github.workspace }}/tests/test_bake_routing.sh
          bash ${{ github.workspace }}/tests/test_headchef_commands.sh
